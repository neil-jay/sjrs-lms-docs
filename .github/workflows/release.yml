name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  contents: write

jobs:
  version-changelog:
    name: Version & Changelog
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version_check.outputs.version_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure Git
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Determine current version
        id: current_version
        run: |
          current_version=$(node -p "require('./package.json').version")
          echo "Current version: $current_version"
          echo "current_version=$current_version" >> $GITHUB_OUTPUT

      - name: Generate version and changelog
        id: release
        continue-on-error: true
        run: |
          # Run standard-version but tell it to not create git tags - we'll do that later
          # If no conventional commits found, standard-version will exit with code 1, but that's OK
          npm run release -- --skip.tag true || echo "No new version needed (no conventional commits since last release)"
          new_version=$(node -p "require('./package.json').version")
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "New version: $new_version"

      - name: Check if version changed
        id: version_check
        run: |
          current_version="${{ steps.current_version.outputs.current_version }}"
          new_version="${{ steps.release.outputs.new_version }}"
          if [ "$current_version" != "$new_version" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "Version changed from $current_version to $new_version"
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $new_version (no conventional commits since last release)"
          fi

      - name: Create Git tag
        if: steps.version_check.outputs.version_changed == 'true'
        run: |
          git tag -a "v${{ steps.release.outputs.new_version }}" -m "Release v${{ steps.release.outputs.new_version }}"

      - name: Commit changes
        if: steps.version_check.outputs.version_changed == 'true'
        run: |
          git add .
          git commit -m "chore(release): ${{ steps.release.outputs.new_version }}" || echo "No changes to commit"

      - name: Push changes
        if: steps.version_check.outputs.version_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push --follow-tags origin HEAD:main

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: version-changelog
    if: needs.version-changelog.outputs.version_changed == 'true'
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Fetch latest changes
        run: |
          git pull origin main

      - name: Get version from package.json
        id: version
        run: |
          new_version=$(node -p "require('./package.json').version")
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "Version: $new_version"

      - name: Extract changelog for release
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          # Extract changelog section for this version only
          awk -v version="$VERSION" '
            BEGIN { in_version = 0; found = 0 }
            /^### \[/ {
              if (found) exit
              if ($0 ~ "\\[" version "\\]") {
                in_version = 1
                found = 1
                next
              }
            }
            in_version && /^### \[/ { exit }
            in_version { print }
          ' CHANGELOG.md > release-notes.txt || echo "Release v$VERSION" > release-notes.txt

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          TAG="v${VERSION}"
          
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists, updating..."
            gh release edit "$TAG" \
              --title "Release v${VERSION}" \
              --notes-file release-notes.txt
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --title "Release v${VERSION}" \
              --notes-file release-notes.txt \
              --target main
          fi
