name: Docs Quality Gates

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'

permissions:
  contents: read

jobs:
  quality-gates:
    name: Build, Check, Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type & content checks
        run: npx astro check

      - name: Build
        run: npm run build

      - name: Validate lifecycle metadata
        run: npm run check:lifecycle

      - name: Link check (content + built HTML)
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --no-progress
            --verbose
            --require-https
            --max-retries 3
            --retry-wait-time 2
            --timeout 20
            --exclude-mail
            --exclude-loopback
            --exclude '(^https://github\.com/neil-jay/sjrs-lms-docs/edit/)'
            './src/content/docs/**/*.md'
            './src/content/docs/**/*.mdx'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
